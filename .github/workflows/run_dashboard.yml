name: Daily PALI Dashboard Update

on:
  schedule:
    - cron: '30 8 * * 1-5' # Runs at 09:30 CET
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  run-dashboard:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Up Python Engine
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Libraries
      run: pip install -r requirements.txt

    - name: Execute Dashboard Script
      run: python dashboard.py

    - name: Send Automated Email Report
      uses: dawidd6/action-send-mail@v4
      with:
        server_address: ://gmail.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: PALI Execution Actions Summary
        to: paliktzoglou@gmail.com
        from: PALI Quant Bot <pali-dashboard@github.com>
        body: file://index.html
        html_body: true

    - name: Commit and Push Webpage File to Main Branch
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add index.html
        git commit -m "Update dynamic web dashboard layout" || echo "No changes to commit"
        git push origin main
