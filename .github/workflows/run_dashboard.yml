name: Daily PALI Dashboard Update

on:
  schedule:
    - cron: '30 8 * * 1-5'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  run-dashboard:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Up Python Engine
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Libraries
      run: pip install -r requirements.txt

    - name: Execute Dashboard Script
      run: python dashboard.py

    - name: Send Automated Email Report
      uses: dawidd6/action-send-mail@v4
      with:
        server_address: ://gmail.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: PALI Execution Actions Summary
        to: paliktzoglou@gmail.com
        from: PALI Quant Bot <pali-dashboard@github.com>
        body: file://index.html
        html_body: true

    - name: Deploy to GitHub Pages Website
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        destination_dir: ./
