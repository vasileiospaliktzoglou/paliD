name: Daily PALI Dashboard Update

on:
  schedule:
    - cron: '30 8 * * 1-5' # Runs at 09:30 CET / Mon-Fri
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  run-dashboard:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Up Python Engine
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Libraries
      run: pip install -r requirements.txt

    - name: Execute Dashboard Script
      run: python dashboard.py

    - name: Save Webpage File to Repository
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@://github.com"
        git add index.html
        git commit -m "Publish live webpage data structure" || echo "No changes to save"
        git push origin main
