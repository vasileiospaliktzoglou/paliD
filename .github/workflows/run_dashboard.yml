name: Daily PALI 

on:
  schedule:
    # Run 1: 08:30 UTC / 11:30 Athens Time (European Morning Session)
    - cron: '30 8 * * 1-5'
    # Run 2: 13:35 UTC / 16:35 Athens Time (Live US Open Volatility Window)
    - cron: '35 13 * * 1-5'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  run-dashboard:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Up Python Engine
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Libraries
      run: pip install -r requirements.txt

    - name: Execute Dashboard Script
      run: python dashboard.py

    - name: Send Automated Email Report
      uses: dawidd6/action-send-mail@v4
      with:
        server_address: ://gmail.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: PALI Execution Actions Summary
        to: paliktzoglou@gmail.com
        from: PALI Quant Bot <pali-dashboard@github.com>
        body: file://index.html
        html_body: true

    - name: Save Webpage File to Repository
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@://github.com"
        git add index.html
        git commit -m "Publish automated market-timed webpage data" || echo "No changes to save"
        git push origin main
