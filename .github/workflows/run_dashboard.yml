name: Daily PALI Dashboard Update

on:
  schedule:
    - cron: '30 8 * * 1-5' # Runs at 08:30 UTC Mon-Fri (09:30 CET)
  workflow_dispatch: 

jobs:
  run-dashboard:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    # ... (Setup Python and Install Libraries steps remain the same) ...

    - name: Execute Dashboard Script
      run: python dashboard.py

    - name: Send Automated Email Report
      uses: dawidd6/action-send-mail@v4
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: PALI Execution Actions Summary
        to: paliktzoglou@gmail.com
        from: PALI Quant Bot <pali-dashboard@github.com>
        body: file://email_report.txt
